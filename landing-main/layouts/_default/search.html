{{ define "main" }}
<section class="search-wrap" data-search-page>
  <div class="search-inner">
    <span class="section-tag" style="display:inline-block;margin-bottom:var(--space-sm)">ПОИСК</span>
    <h1 class="section-title">Поиск по материалам сообщества</h1>
    <p class="section-desc">Введите вопрос или тему – ответит ассистент Claude, опираясь на полный текст статей, встреч и инсайтов (тот же поиск, что <code>grep</code> в Shell).</p>

    <form class="search-form" data-search-form role="search" action="/shell/" method="get">
      <input class="search-input" type="search" name="q" placeholder="Напр.: бас-фактор, когда нанимать, метрики, AI…" data-search-input autocomplete="off" aria-label="Поисковый запрос">
      <button class="search-submit" type="submit">Спросить</button>
    </form>

    <p class="search-hint">
      Также: <a href="/shell/">Shell</a> · клавиша <kbd>Ctrl</kbd>/<kbd>⌘</kbd>+<kbd>K</kbd> в любом месте сайта · <a href="/shell/#sim">симулятор</a>
    </p>
    <noscript><p class="search-hint">Без JavaScript откройте <a href="/shell/">Shell</a> и наберите <code>grep &lt;слово&gt;</code>.</p></noscript>
  </div>
</section>
{{ end }}
