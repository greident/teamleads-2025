{{ define "main" }}
<section class="nf-wrap">
  <div class="container nf-inner">

    <div class="nf-head">
      <span class="section-tag" style="display:inline-block;margin-bottom:var(--space-sm)">404</span>
      <h1 class="section-title">Страница не найдена</h1>
      <p class="section-desc">Зато сессию мы вам поднимем. Ниже – настоящий терминал в режиме навигации: наберите <code>help</code> и осмотритесь, или сразу <code>ls</code>. Tab – автодополнение, ↑/↓ – история.</p>
    </div>

    {{ partial "shell.html" (dict "mode" "404") }}

    <!-- No-JS / accessibility fallback -->
    <div class="nf-fallback">
      <a href="/" class="btn btn-primary">На главную</a>
      <a href="/shell/" class="btn btn-secondary">Shell Mode</a>
      <a href="{{ .Site.Params.telegram }}" class="btn btn-secondary" target="_blank" rel="noopener">Telegram-группа</a>
    </div>

  </div>
</section>
{{ end }}
