<!DOCTYPE html>
<html lang="ru">
<head>

        a { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #1F2937; color: #fff;
            text-decoration: none; border-radius: 999px; font-weight: 500; }

    <div class="box">
