baseURL = "https://teamleads.kz/"
languageCode = "ru"
title = "Тимлид не кодит – Сообщество тимлидов Казахстана"
# theme = ""  # Using custom layouts, no external theme
[pagination]
  pagerSize = 12

[taxonomies]
  tag = "tags"

# Plain-markdown rendition of each page, emitted next to its HTML as index.md.
# The Shell's `cat` command fetches it on demand (same-origin).
[outputFormats.cat]
  mediaType = "text/markdown"
  suffix = "md"
  baseName = "index"
  isPlainText = true
  notAlternative = true

# Full-text search index for the Shell's `grep` command — one JSON file, fetched once.
[outputFormats.shellindex]
  mediaType = "application/json"
  baseName = "shell-index"
  suffix = "json"
  isPlainText = true
  notAlternative = true

# Per-page "open in shell" share card: a real URL (/<section>/<base>/shell.html) with
# a terminal-style OG image for `cat <section>/<base>` + a JS redirect into /shell/.
# Enabled only on content sections via cascade in their _index.md.
[outputFormats.catshare]
  mediaType = "text/html"
  baseName = "shell"
  suffix = "html"
  notAlternative = true

[outputs]
  page = ["html", "cat"]
  home = ["html", "rss", "shellindex"]

[params]
  description = "Крупнейшее сообщество тимлидов и технических лидеров Казахстана. Архитектура. Люди. Процессы разработки."
  telegram = "https://t.me/teamleads_kz"
  telegramHandle = "@teamleads_kz"

  # Stats — participantsCount is the external Telegram member count (update manually);
  # the other homepage stats are computed live from content and never go stale.
  participantsCount = "510"
  topicsCount = "50+"

  # GitHub edit links — used by "Edit on GitHub" button on event pages
  githubRepo = "belyaevsa/teamleads-2025"
  githubBranch = "master"
  githubContentPath = "landing-main/content"

  # Recurring meetup schedule — every Wednesday 17:00, Astana (UTC+5)
  [params.meetup]
    # TODO: replace with the real recurring meeting link. Single source of truth:
    # /join redirects here, and the calendar points at the constant /join URL.
    joinUrl = "https://meet.google.com/xxx-xxxx-xxx"
    weekdayNominative = "среда"
    weekdayAccusative = "среду"
    time = "17:00"
    tzLabel = "Астана, UTC+5"
    tzId = "Asia/Almaty"
    ics = "/teamleads-meetup.ics"
    isoWeekday = 3   # Mon=1 … Wed=3 — used by JS to compute the next occurrence
    hour = 17

  # Kazakhstan-inspired colors
  [params.colors]
    primary = "#00AFCA"
    primaryLight = "#E5F7FA"
    primaryDark = "#008BA3"
    accent = "#FEC50C"
    accentLight = "#FFF8DC"

[build]
  writeStats = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
