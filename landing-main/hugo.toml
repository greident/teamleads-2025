baseURL = "https://teamleads.kz/"
languageCode = "ru"
title = "Тимлид не кодит – Сообщество тимлидов Казахстана"
# theme = ""  # Using custom layouts, no external theme

disableKinds = ["taxonomy", "term"]

[params]
  description = "Крупнейшее сообщество тимлидов и технических лидеров Казахстана. Архитектура. Люди. Процессы разработки."
  telegram = "https://t.me/teamleads_kz"
  telegramHandle = "@teamleads_kz"

  # Stats — participantsCount is the external Telegram member count (update manually);
  # the other homepage stats are computed live from content and never go stale.
  participantsCount = "510"
  topicsCount = "50+"

  # GitHub edit links — used by "Edit on GitHub" button on event pages
  githubRepo = "belyaevsa/teamleads-2025"
  githubBranch = "master"
  githubContentPath = "landing-main/content"

  # Recurring meetup schedule — every Wednesday 17:00, Astana (UTC+5)
  [params.meetup]
    weekdayNominative = "среда"
    weekdayAccusative = "среду"
    time = "17:00"
    tzLabel = "Астана, UTC+5"
    tzId = "Asia/Almaty"
    ics = "/teamleads-meetup.ics"
    isoWeekday = 3   # Mon=1 … Wed=3 — used by JS to compute the next occurrence
    hour = 17

  # Kazakhstan-inspired colors
  [params.colors]
    primary = "#00AFCA"
    primaryLight = "#E5F7FA"
    primaryDark = "#008BA3"
    accent = "#FEC50C"
    accentLight = "#FFF8DC"

[build]
  writeStats = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
