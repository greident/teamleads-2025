# Тимлид-симулятор – данные для команды `sim` в shell-режиме.
# Развилки из реальных споров сообщества. Каждый сценарий:
#   prompt   – ситуация (можно несколько строк),
#   options  – варианты [label, good, votes, outcome]; good=true даёт +1 к счёту,
#   lesson   – вывод, link – «section/slug» материала для разбора (резолвится в URL).
# Добавляйте сценарии свободно – порядок в прогоне перемешивается.

title: "Тимлид-симулятор"
intro: "Короткие развилки из реальных споров сообщества. Выбирай – смотри последствия."
shareUrl: "https://teamleads.kz/shell/#sim"

scenarios:
  - id: bus-factor
    prompt: |-
      Единственный, кто знает платёжный модуль, увольняется через две недели.
      Прод-диск зашифрован по требованию HIPAA – пароль только у него в голове.
    options:
      - label: "Посадить дублёра в пару и сразу перенести доступы в общее хранилище"
        good: true
        votes: 58
        outcome: "Знание переезжает в живого человека, а пароль – из головы в хранилище. Так и выглядит страховка."
      - label: "Заказать подробную документацию по модулю"
        good: false
        votes: 30
        outcome: "Док опишет «что», но не «почему». А пароль в документ не запишешь – он всё ещё в чужой голове."
      - label: "Заморозить вопрос: сейчас релиз, потом разберёмся"
        good: false
        votes: 12
        outcome: "Две недели проходят. Экстремальная ситуация рождается из экономии – и стоит дороже всех релизов."
    lesson: "Продуктовое знание не живёт в документах, а доступы – не в головах. Живой дублёр плюс общее хранилище."
    link: "articles/bas-faktor-odin-nositel-znaniy"

  - id: junior-burn
    prompt: |-
      Джун впервые уронил прод – зона поражения ограничена, клиенты не в панике.
      Стоит рядом, руки трясутся, ждёт, что вы всё почините за него.
    options:
      - label: "Чинить самому – быстро, пока не разнесло"
        good: false
        votes: 34
        outcome: "Прод спасён, джун – нет. В следующий раз снова прибежит к вам, а ответственность так и не приросла."
      - label: "Дать ему чинить под присмотром, потом безблам-разбор и план отката на будущее"
        good: true
        votes: 55
        outcome: "Руль у него, вы рядом. Право на ошибку плюс дисциплина «как откатывать» – и ответственность растёт."
      - label: "Отстранить от прода – пусть пока не трогает"
        good: false
        votes: 11
        outcome: "Снимаете риск и заодно рост. Джун останется джуном, а прод станет для него чужой территорией."
    lesson: "Ответственность не передаётся лекцией. Дайте обжечься под присмотром – и научите думать об откате заранее."
    link: "insights/week-2026-06-16"

  - id: imposed-decision
    prompt: |-
      Стейкхолдер требует выкатить фичу его любимым способом.
      Вы видите, что способ дороже и хрупче.
    options:
      - label: "Молча сделать как просят – он же заказчик"
        good: false
        votes: 27
        outcome: "Доверие куплено ценой техдолга. Платить будет команда."
      - label: "Показать на цифрах два пути и дать выбрать ему"
        good: true
        votes: 61
        outcome: "Решение остаётся за ним, но теперь информированное. Это и есть влияние."
      - label: "Сделать по-своему и поставить перед фактом"
        good: false
        votes: 12
        outcome: "Иногда срабатывает. Чаще сжигает доверие, которое потом не вернуть."
    lesson: "Бороться с навязанным решением – это не саботаж и не подчинение, а аргументы и выбор."
    link: "articles/kak-borotsya-s-navyazannymi-resheniyami"

  - id: metrics-lie
    prompt: |-
      Дашборд зелёный: velocity растёт, тикетов закрыто больше.
      А пользователи жалуются громче прежнего.
    options:
      - label: "Верить дашборду – цифры не врут"
        good: false
        votes: 18
        outcome: "Цифры не врут, но отвечают не на тот вопрос. Закрыто не значит полезно."
      - label: "Пойти к пользователям и посмотреть на реальный путь"
        good: true
        votes: 64
        outcome: "Метрика – палец, указывающий на луну. Смотреть надо на луну."
      - label: "Добавить ещё метрик, чтобы стало понятнее"
        good: false
        votes: 18
        outcome: "Больше приборов – не больше зрения. Иногда это шум поверх шума."
    lesson: "Метрики врут не потому что ложны, а потому что вы смотрите не туда."
    link: "articles/metriki-vruyt-ili-vy-nepravilno-smotrite"

  - id: naslabo
    prompt: |-
      Команда оценивает фичу в полгода. Вы подозреваете, что за оценкой –
      не сложность, а страх обещать.
    options:
      - label: "Принять оценку – команде виднее"
        good: false
        votes: 26
        outcome: "Иногда виднее. Иногда полгода – это «не хочу обещать». Без проверки вы не отличите одно от другого."
      - label: "Запустить с командой короткий спайк-прототип и сверить оценку на результате"
        good: true
        votes: 51
        outcome: "Три дня эксперимента снимают неопределённость лучше совещаний. Это не «я же говорил», а общая проверка."
      - label: "Продавить дедлайн сверху без проверки"
        good: false
        votes: 23
        outcome: "Дедлайн назначен, доверие потрачено, а реальная сложность всё ещё никому не известна."
    lesson: "Дорогая оценка часто прячется за страх. Дешёвый совместный эксперимент проверяет её, не обесценивая команду."
    link: "articles/r-and-d-v-it-chto-schitat-issledovaniem"

  # --- added by /process-meetup from meetup-2026-06-24 ---
  - id: meetup-2026-06-24-when-to-hire
    prompt: |-
      Команда не вывозит, каждый тянет по две-три роли.
      Просите ещё одного человека – «и всё наладится».
    options:
      - label: "Нанять сразу – рук явно не хватает"
        good: false
        votes: 48
        outcome: "Иногда помогает. Чаще растят бюрократию и теряют, кто за что отвечает."
      - label: "Понять, какая роль перегружена без компетенции, и нанять под неё"
        good: true
        votes: 40
        outcome: "Узкое место снято точечно. Это найм против боли, а не ради оргструктуры."
      - label: "Добавить процессы и подождать – вдруг устаканится"
        good: false
        votes: 12
        outcome: "Процесс поверх перегруза – это лак поверх трещины."
    lesson: "Нанимать стоит под конкретную перегруженную роль, а не чтобы «стало полегче» вообще."
    link: "events/meetup-2026-06-24"

  # --- карьера ---
  - id: career-fork
    prompt: |-
      Сеньор просит повышения до тимлида: «пора расти».
      Свободной тимлидской вакансии нет, а ждать можно годами.
    options:
      - label: "Создать должность под него – иначе уйдёт"
        good: false
        votes: 31
        outcome: "Лычка есть, роли нет. Управленческая работа может оказаться ему адом, а место уже занято."
      - label: "Разобрать развилку: техветка или менеджмент – и расти по содержанию, а не по лычке"
        good: true
        votes: 52
        outcome: "Тимлид – не «сеньор плюс подчинённые». Иногда рост – остаться сильным инженером или сменить компанию."
      - label: "Посоветовать дождаться вакансии – или подсидеть действующего"
        good: false
        votes: 17
        outcome: "Ждать можно дольше, чем вырасти. А игра в подсиживание сжжёт вас в той же компании."
    lesson: "Тимлидов структурно меньше, чем сеньоров. Рост измеряют не должностью, а тем, что вы можете в чужом проекте."
    link: "articles/karernyy-trek-razrabotchika-posle-senora"

  # --- процессы / соблюдение ритуалов ---
  - id: ritual-diagnosis
    prompt: |-
      Инженер систематически не ведёт важный процесс (логи, статус, ревью).
      1-1 провели – ноль. Уволить нельзя.
    options:
      - label: "Давить публично: пусть команда на дейлике спросит у него"
        good: false
        votes: 29
        outcome: "Давление работает, когда не хочет. Если забывает или не видит ценности – будет стресс без результата."
      - label: "Сначала диагноз – не хочет, забывает, не может встроить, не видит ценности – потом инструмент"
        good: true
        votes: 47
        outcome: "Забыл → триггер. Не видит ценности → два кейса с последствиями. Лекарство под причину, а не под настроение."
      - label: "Переложить процесс на самого ответственного – кто пашет, на том и едут"
        good: false
        votes: 24
        outcome: "Снимаете проблему один раз. На второй ответственный задумается, зачем вообще стараться."
    lesson: "Один инструмент на все причины создаёт стресс без результата. Сначала диагноз, потом лекарство."
    link: "articles/sotrudnik-ne-soblyudaet-ritual-chto-delat"

  # --- AI: архитектура ---
  - id: ai-scout
    prompt: |-
      Бизнес хочет встроить LLM в поддержку навсегда:
      «пусть сама отвечает клиентам, как все».
    options:
      - label: "Встроить в прод навсегда – так сейчас все делают"
        good: false
        votes: 38
        outcome: "Стохастический компонент на критичном пути. Галлюцинации, привязка к чужому API и ценам – теперь навсегда."
      - label: "Использовать LLM как разведчика: собрать паттерны и формализовать их в обычный код"
        good: true
        votes: 45
        outcome: "Модель разведала реальное поведение – и ушла. На её месте скучный предсказуемый код, который не галлюцинирует."
      - label: "Не трогать вовсе – слишком рискованно"
        good: false
        votes: 17
        outcome: "Вы спаслись от риска и заодно упустили discovery: половина правил всё ещё живёт только в головах."
    lesson: "Самый зрелый способ внедрить ИИ – иногда внедрить его временно. Разведать – и уйти, оставив детерминированный код."
    link: "articles/llm-kak-razvedchik"

  # --- AI: состав команды ---
  - id: ai-team-shape
    prompt: |-
      Кодинг подешевел: AI пишет бойлерплейт за копейки.
      Формируете команду на новый продукт.
    options:
      - label: "Набрать 10 джунов на бойлерплейт – рук много, дёшево"
        good: false
        votes: 33
        outcome: "Именно эту работу через год будет делать один человек с AI. Команда, заточенная под то, что обесценилось."
      - label: "Взять пару сильных инженеров, что держат систему целиком и работают с AI"
        good: true
        votes: 54
        outcome: "Понимание бизнеса, архитектура и ответственность за прод. Ценные в обоих сценариях будущего."
      - label: "Заменить разработчиков автономными агентами – один человек на 117"
        good: false
        votes: 13
        outcome: "Код генерируется. Кто несёт ответственность за прод и держит контекст параллельных миграций – непонятно."
    lesson: "Не ставьте на один сценарий. Сильна команда, ценная при любом будущем – кто понимает бизнес и отвечает за результат."
    link: "articles/zamenit-li-ai-razrabotchikov"

  # --- продуктовые разработчики ---
  - id: product-engineer
    prompt: |-
      Нужен «продуктовый разработчик» – чтобы понимал бизнес,
      а не только код. Где его взять?
    options:
      - label: "Учить программированию и бизнесу одновременно с нуля"
        good: false
        votes: 21
        outcome: "Педагогически неверно и дорого. За большим хайпом часто скрывается большой попил."
      - label: "Сначала вырастить инженера, потом доучивать до продуктового через гембу и доменных экспертов"
        good: true
        votes: 49
        outcome: "Разработчик есть – теперь ему показывают реальную работу бизнеса на месте, а не на слайдах."
      - label: "Нанять по грейду и надеяться, что сам разберётся"
        good: false
        votes: 30
        outcome: "Грейд не гарантирует понимания предметки. Через год получите крепкого кодера, глухого к бизнесу."
    lesson: "Сначала инженер, потом – продуктовый. Гемба и доменные эксперты вместо хайпа."
    link: "events/meetup-2026-06-24"
