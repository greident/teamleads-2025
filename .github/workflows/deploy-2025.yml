name: Deploy 2025 → 2025.teamleads.kz

on:
  push:
    branches: [master]
    paths:
      - '2025/hugo-claude/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DEPLOY_ROOT: /opt/2025.teamleads.kz

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 2025/hugo-claude/package-lock.json

      - name: Install PostCSS & Tailwind
        working-directory: 2025/hugo-claude
        run: npm ci

      - name: Build Hugo site
        working-directory: 2025/hugo-claude
        run: hugo --minify

      - name: Deploy
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_DIR="${DEPLOY_ROOT}/${SHORT_SHA}"

          cp -r 2025/hugo-claude/public "$RELEASE_DIR"

          ln -sfn "$RELEASE_DIR" "${DEPLOY_ROOT}/latest"

          echo "Deployed $SHORT_SHA → ${DEPLOY_ROOT}/latest"

      - name: Cleanup old releases (keep last 5)
        run: |
          cd "$DEPLOY_ROOT"
          ls -dt */ | grep -v latest | tail -n +6 | xargs -r rm -rf
